<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GDrums — Links</title>
  <meta name="description" content="Links oficiais do GDrums — baterista virtual compatível com pedal Bluetooth. App, Instagram, WhatsApp e mais.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#030014">

  <link rel="icon" type="image/png" sizes="512x512" href="/img/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/img/icon-192.png">
  <link rel="canonical" href="https://gdrums.com.br/links">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="GDrums">
  <meta property="og:title" content="GDrums — Links Oficiais">
  <meta property="og:description" content="Tudo do GDrums em um só lugar.">
  <meta property="og:image" content="https://gdrums.com.br/img/icon-512.png">
  <meta property="og:url" content="https://gdrums.com.br/links">
  <meta property="og:locale" content="pt_BR">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #030014;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Background com orbs vibrantes (mesmo da landing) */
    .links-bg { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
    .links-orb {
      position: absolute; border-radius: 50%; filter: blur(110px); opacity: 0.45;
      animation: floatLinks 22s ease-in-out infinite;
    }
    .links-orb.cyan { width: 480px; height: 480px; background: radial-gradient(circle, #00D4FF 0%, transparent 70%); top: -160px; left: -120px; }
    .links-orb.purple { width: 420px; height: 420px; background: radial-gradient(circle, #8B5CF6 0%, transparent 70%); top: 30%; right: -120px; animation-delay: 6s; }
    .links-orb.pink { width: 360px; height: 360px; background: radial-gradient(circle, #EC4899 0%, transparent 70%); bottom: -120px; left: 40%; animation-delay: 12s; }
    @keyframes floatLinks {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.08); }
      66% { transform: translate(-30px, 30px) scale(0.92); }
    }

    .links-page {
      position: relative;
      z-index: 1;
      max-width: 540px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar — usa logo redondo */
    .links-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #0a0a0f;
      border: 2px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
    }
    .links-avatar img {
      width: 70%;
      height: 70%;
      object-fit: contain;
    }

    .links-handle {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.015em;
      margin-bottom: 0.35rem;
    }
    .links-bio {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      max-width: 360px;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 1rem 1.1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      transition: all 0.18s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .link-item:hover, .link-item:active {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateY(-1px);
    }
    .link-item-icon {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.06);
    }
    .link-item-icon svg { width: 22px; height: 22px; }
    .link-item-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .link-item-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.005em;
    }
    .link-item-sub {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .link-item-arrow {
      flex-shrink: 0;
      color: rgba(255, 255, 255, 0.3);
      transition: transform 0.18s, color 0.18s;
    }
    .link-item:hover .link-item-arrow {
      color: #fff;
      transform: translateX(2px);
    }

    .links-loading,
    .links-empty {
      width: 100%;
      text-align: center;
      padding: 2rem 1rem;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
    }
    .links-loading-spin {
      width: 26px;
      height: 26px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      margin: 0 auto 0.6rem;
      animation: spinLinks 0.8s linear infinite;
    }
    @keyframes spinLinks { to { transform: rotate(360deg); } }

    .links-footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.25);
      font-style: italic;
    }
    .links-footer a {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
    }
    .links-footer a:hover { color: rgba(255, 255, 255, 0.7); }
  </style>
</head>
<body>
  <div class="links-bg">
    <div class="links-orb cyan"></div>
    <div class="links-orb purple"></div>
    <div class="links-orb pink"></div>
  </div>

  <main class="links-page">
    <div class="links-avatar">
      <img src="/img/logo.png" alt="GDrums" />
    </div>
    <h1 class="links-handle">GDrums</h1>
    <p class="links-bio">Sua banda completa no celular. <br/>+100 ritmos brasileiros, pedal Bluetooth, pra músico tocar ao vivo.</p>

    <div class="links-list" id="linksList">
      <div class="links-loading">
        <div class="links-loading-spin"></div>
        Carregando…
      </div>
    </div>

    <p class="links-footer">
      Pra honra e glória de Deus<br/>
      <a href="/landing">gdrums.com.br</a>
    </p>
  </main>

  <script type="module" src="/src/links.ts"></script>
</body>
</html>
