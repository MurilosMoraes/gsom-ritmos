<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — GDrums</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <meta name="theme-color" content="#030014">
  <link rel="canonical" href="https://gdrums.com.br/login">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #030014;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #0a0a0f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem 1.75rem;
    }

    .login-logo {
      display: block;
      height: 28px;
      margin: 0 auto 1.75rem;
      opacity: 0.85;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      line-height: 1.2;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .login-sub {
      font-size: 0.88rem;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .login-field { margin-bottom: 0.9rem; }
    .login-field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #fff;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .login-field input:focus {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.05);
    }
    .login-field input::placeholder { color: rgba(255, 255, 255, 0.22); }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      font-size: 0.78rem;
    }
    .login-options label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
    }
    .login-options input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #fff;
    }
    .login-options a {
      color: rgba(255, 255, 255, 0.72);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }
    .login-options a:hover { color: #fff; }

    .login-btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #0a0a0f;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      position: relative;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:active { transform: scale(0.99); }
    .login-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    .login-btn .btn-loader { display: none; }
    .login-btn .btn-loader.active { display: block; }
    .login-btn .btn-text.hidden { display: none; }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    .login-footer {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .login-footer a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 1px;
    }
    .login-footer a:hover { color: #fff; }

    .login-alert {
      margin-top: 0.85rem;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      font-size: 0.8rem;
      display: none;
      text-align: center;
    }
    .login-alert.error {
      background: rgba(255, 68, 102, 0.08);
      color: #ff6b83;
      border: 1px solid rgba(255, 68, 102, 0.2);
    }
    .login-alert.success {
      background: rgba(0, 230, 140, 0.08);
      color: #3ee8a7;
      border: 1px solid rgba(0, 230, 140, 0.2);
    }

    .login-support {
      text-align: center;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .login-support a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.76rem;
      text-decoration: none;
      transition: color 0.15s;
    }
    .login-support a:hover { color: rgba(255, 255, 255, 0.75); }

    .login-glory {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.3);
      font-style: italic;
    }

    .spinner-sm {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10, 10, 15, 0.3);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="/img/logo.png" alt="GDrums" class="login-logo" />
    <h1 class="login-title">Entrar na sua conta.</h1>
    <p class="login-sub">Continue de onde parou.</p>

    <form id="loginForm">
      <div class="login-field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="login-field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required placeholder="Sua senha" autocomplete="current-password" />
      </div>

      <div class="login-options">
        <label>
          <input type="checkbox" id="rememberMe" />
          <span>Lembrar de mim</span>
        </label>
        <a href="#" id="forgotPasswordBtn">Esqueci a senha</a>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span class="btn-text">Entrar</span>
        <span class="btn-loader"><div class="spinner-sm"></div></span>
      </button>
    </form>

    <div class="login-alert" id="alertMessage"></div>

    <div class="login-divider"><span>ou</span></div>

    <p class="login-footer">
      Não tem conta? <a href="/register">Criar conta</a>
    </p>

    <div class="login-support">
      <a href="https://chat.whatsapp.com/CnTLQogcUNFEVeFkyKzkyK" target="_blank">
        Precisa de ajuda? Falar com o suporte
      </a>
    </div>

    <p class="login-glory">Pra honra e glória de Deus</p>
  </div>

  <script type="module" src="/src/auth/login.ts"></script>
</body>
</html>
