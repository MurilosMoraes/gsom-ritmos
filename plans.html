<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planos GDrums — A partir de R$ 29/mês</title>
  <meta name="description" content="Planos do GDrums com acesso a 100 ritmos, pedal Bluetooth e apps iOS/Android. Mensal R$ 29, Anual R$ 228, Rei dos Palcos (3 anos) R$ 522.">
  <meta name="author" content="Murilo Moraes, Staner Goulart">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="theme-color" content="#030014">

  <link rel="icon" type="image/png" sizes="512x512" href="/img/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/img/icon-192.png">
  <link rel="canonical" href="https://gdrums.com.br/plans">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="GDrums">
  <meta property="og:title" content="Planos GDrums — A partir de R$ 29/mês">
  <meta property="og:description" content="Acesso total: 100 ritmos, pedal Bluetooth, apps iOS/Android. Trial 48h grátis sem cartão.">
  <meta property="og:image" content="https://gdrums.com.br/img/icon-512.png">
  <meta property="og:url" content="https://gdrums.com.br/plans">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Planos GDrums — A partir de R$ 29/mês">
  <meta name="twitter:description" content="Acesso total: 100 ritmos, pedal Bluetooth, apps iOS/Android.">
  <meta name="twitter:image" content="https://gdrums.com.br/img/icon-512.png">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "GDrums — Sequenciador de Ritmos",
    "description": "Baterista virtual com 100 ritmos brasileiros, pedal Bluetooth, viradas e finalizações. Apps iOS, Android e web.",
    "brand": { "@type": "Brand", "name": "GDrums" },
    "image": "https://gdrums.com.br/img/icon-512.png",
    "offers": {
      "@type": "AggregateOffer",
      "priceCurrency": "BRL",
      "lowPrice": "29.00",
      "highPrice": "522.00",
      "offerCount": 5,
      "availability": "https://schema.org/InStock",
      "url": "https://gdrums.com.br/plans"
    }
  }
  </script>
  <link rel="stylesheet" href="auth-styles.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #030014;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .plans-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    /* Header top bar */
    .plans-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 960px;
      margin-bottom: 2.5rem;
    }
    .plans-logo {
      height: 22px;
      opacity: 0.85;
    }
    .plans-top-actions {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    .plans-top-link {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      letter-spacing: -0.005em;
      transition: color 0.15s;
    }
    .plans-top-link:hover { color: #fff; }
    .plans-logout-btn {
      padding: 0.45rem 0.9rem;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .plans-logout-btn:hover {
      border-color: rgba(255, 255, 255, 0.25);
      color: #fff;
    }

    /* Hero */
    .plans-hero {
      text-align: center;
      max-width: 560px;
      margin-bottom: 2.5rem;
    }
    .plans-overline {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      font-weight: 500;
      margin-bottom: 0.85rem;
    }
    .plans-title {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #fff;
      margin: 0 0 0.75rem;
    }
    .plans-subtitle {
      font-size: 0.95rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.55);
      margin: 0;
    }

    .alert-bar {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      max-width: 960px;
      width: 100%;
      display: none;
    }

    /* Cupom */
    .coupon-section {
      max-width: 960px;
      width: 100%;
      margin-bottom: 1.75rem;
    }
    .coupon-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
    }
    .coupon-input {
      flex: 1;
      max-width: 260px;
      padding: 0.65rem 0.9rem;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: border-color 0.15s, background 0.15s;
    }
    .coupon-input:focus {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.05);
    }
    .coupon-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
      text-transform: none;
      letter-spacing: 0;
    }
    .coupon-btn {
      padding: 0.65rem 1.1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.82rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .coupon-btn:hover {
      border-color: rgba(255, 255, 255, 0.25);
      color: #fff;
    }
    .coupon-btn:disabled { opacity: 0.4; cursor: default; }
    .coupon-status {
      font-size: 0.78rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
      text-align: center;
    }
    .coupon-status.success { color: #3ee8a7; }
    .coupon-status.error { color: #ff6b83; }
    .coupon-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 0.35rem 0.7rem;
      font-size: 0.76rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.01em;
    }
    .coupon-badge button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.2rem;
    }
    .coupon-badge button:hover { color: #fff; }

    /* Grid de planos */
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 0.85rem;
      max-width: 960px;
      width: 100%;
    }

    .plan-card {
      background: #0a0a0f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1.75rem 1.4rem 1.4rem;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.18s;
    }
    .plan-card:hover { border-color: rgba(255, 255, 255, 0.18); }
    .plan-card.popular {
      border-color: rgba(255, 255, 255, 0.22);
      background: #0d0d14;
    }

    .plan-badge {
      position: absolute;
      top: -1px;
      right: 1rem;
      background: #fff;
      color: #0a0a0f;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.3rem 0.7rem;
      border-radius: 0 0 8px 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .plan-name {
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 1rem;
    }

    .plan-original-price {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: line-through;
      margin-bottom: 0.1rem;
      letter-spacing: -0.005em;
    }

    .plan-price {
      display: flex;
      align-items: baseline;
      gap: 0.25rem;
      margin-bottom: 0.2rem;
    }
    .plan-currency {
      font-size: 1rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
    }
    .plan-amount {
      font-size: 2.25rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: #fff;
      line-height: 1;
    }
    .plan-period {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
      margin-left: 0.1rem;
    }

    .plan-savings {
      font-size: 0.76rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 0.4rem;
    }
    .plan-total {
      font-size: 0.76rem;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 1.25rem;
    }

    .plan-features {
      list-style: none;
      padding: 0;
      margin: 0 0 1.5rem;
      flex: 1;
    }
    .plan-features li {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.68);
      padding: 0.42rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      line-height: 1.4;
    }
    .plan-features li::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      flex-shrink: 0;
      transform: translateY(-2px);
    }

    .plan-btn {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .plan-btn:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    .plan-card.popular .plan-btn {
      background: #fff;
      color: #0a0a0f;
      border-color: #fff;
      font-weight: 600;
    }
    .plan-card.popular .plan-btn:hover {
      opacity: 0.9;
    }

    .plans-footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      letter-spacing: 0.005em;
    }
    .plans-glory {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.25);
      font-style: italic;
      text-align: center;
    }

    .plans-loading {
      position: fixed; inset: 0;
      background: rgba(3, 0, 20, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 1rem;
    }
    .plans-loading.active { display: flex; }
    .plans-loading-text {
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.9rem;
      letter-spacing: -0.005em;
    }
    .plans-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-top-color: rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="plans-container">
    <div class="plans-topbar">
      <img src="/img/logo.png" alt="GDrums" class="plans-logo" />
      <div class="plans-top-actions">
        <a href="https://chat.whatsapp.com/CnTLQogcUNFEVeFkyKzkyK" target="_blank" class="plans-top-link">Suporte</a>
        <button id="plansLogoutBtn" class="plans-logout-btn">Sair</button>
      </div>
    </div>

    <div class="plans-hero">
      <div class="plans-overline">Planos</div>
      <h1 class="plans-title">Escolha como quer seguir.</h1>
      <p class="plans-subtitle">
        Todos os planos incluem a biblioteca completa, pedal Bluetooth,
        setlist e modo offline. Sem limite de uso. Cancele quando quiser.
      </p>
    </div>

    <div class="alert-bar" id="alertBar"></div>

    <div class="coupon-section" id="couponSection">
      <div class="coupon-row">
        <input type="text" class="coupon-input" id="couponInput" placeholder="Tem um cupom?" maxlength="20" />
        <button class="coupon-btn" id="couponBtn">Aplicar</button>
      </div>
      <div class="coupon-status" id="couponStatus"></div>
    </div>

    <div class="plans-grid" id="plansGrid">
      <!-- Cards gerados pelo JS -->
    </div>

    <p class="plans-footer">Pagamento seguro via InfinitePay.</p>
    <p class="plans-glory">Pra honra e glória de Deus</p>
  </div>

  <div class="plans-loading" id="plansLoading">
    <div class="plans-spinner"></div>
    <span class="plans-loading-text">Redirecionando para pagamento</span>
  </div>

  <script type="module" src="/src/auth/plans.ts"></script>
</body>
</html>
