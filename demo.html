<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">

  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="GDrums — Teste Grátis sem Cadastro">
  <meta name="twitter:description" content="3 ritmos liberados. Biblioteca com 100 ritmos brasileiros, pedal Bluetooth.">
  <meta name="twitter:image" content="https://gdrums.com.br/img/icon-512.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ─── Topbar de conversão ───
       Não é só identidade visual — é uma peça ativa que vende o trial.
       Hierarquia: headline de valor > progresso > CTA gordo com brilho.
       Em mobile vira compacto de 1 linha; desktop tem mais ar e peso. */
    .demo-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9998;
      background: rgba(6, 6, 12, 0.94);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 0.7rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      min-height: 3.5rem;
    }

    /* Logo compacto só no canto — não rouba atenção */
    .demo-topbar-logo {
      height: 20px;
      opacity: 0.85;
      flex-shrink: 0;
    }

    /* Separador vertical */
    .demo-topbar-sep {
      width: 1px; height: 20px;
      background: rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    /* Bloco central: headline de valor + progresso pequeno */
    .demo-topbar-mid {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
      overflow: hidden;
    }
    .demo-topbar-headline {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .demo-topbar-headline strong {
      color: #3ee8a7;
      font-weight: 600;
    }
    .demo-topbar-progress {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.005em;
      font-variant-numeric: tabular-nums;
    }
    .demo-topbar-progress.low {
      color: rgba(255, 180, 100, 0.85);
      font-weight: 500;
    }

    /* CTA principal — peso visual máximo, destaque branco com leve glow */
    .demo-topbar-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.6rem 1.1rem;
      border: none; border-radius: 10px;
      background: #fff; color: #0a0a0f;
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: -0.005em;
      font-family: inherit; cursor: pointer; text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 28px rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }
    .demo-topbar-cta:hover { opacity: 0.92; transform: translateY(-1px); }
    .demo-topbar-cta:active { transform: translateY(0) scale(0.98); }
    .demo-topbar-cta-arrow {
      font-size: 0.95em;
      line-height: 1;
      transform: translateY(-0.5px);
    }

    /* Barra de progresso na base — mais visível que antes */
    .demo-topbar-bar {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, #3ee8a7, rgba(62, 232, 167, 0.3));
      transition: width 0.3s ease;
      border-radius: 0 2px 2px 0;
    }

    /* Mobile: headline some, mantém só progresso + CTA pra ficar limpo */
    @media (max-width: 560px) {
      .demo-topbar {
        padding: 0.55rem 0.8rem;
        gap: 0.6rem;
        min-height: 3.1rem;
      }
      .demo-topbar-logo { height: 18px; }
      .demo-topbar-sep { display: none; }
      .demo-topbar-headline {
        font-size: 0.75rem;
      }
      .demo-topbar-progress {
        display: none;
      }
      .demo-topbar-cta {
        padding: 0.5rem 0.85rem;
        font-size: 0.76rem;
      }
      .demo-topbar-cta-arrow { display: none; }
    }
    /* Banner de valor — fica logo abaixo do topbar. Tom editorial,
       não vendedor. Clique no CTA vai direto pra cadastro. */
    .demo-value-banner {
      position: fixed;
      top: 3.5rem;
      left: 0; right: 0;
      z-index: 9997;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.55rem 1rem;
      background: rgba(8, 8, 14, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: -0.003em;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .demo-value-banner strong { color: #fff; font-weight: 500; }
    .demo-value-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #3ee8a7;
      box-shadow: 0 0 6px rgba(62, 232, 167, 0.55);
      animation: demoValuePulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes demoValuePulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }
    .demo-value-cta {
      display: inline-block;
      margin-left: 0.5rem;
      padding: 0.25rem 0.65rem;
      background: #fff;
      color: #0a0a0f;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .demo-value-cta:hover { opacity: 0.88; }

    /* Mobile: simplifica pra caber em 1 linha */
    @media (max-width: 520px) {
      .demo-value-banner {
        font-size: 0.7rem;
        padding: 0.5rem 0.7rem;
      }
    }

    /* Empurra o conteúdo pra baixo do topbar. Banner adiciona padding
       quando fica visível via classe .with-banner no body */
    .app-container {
      padding-top: 3.5rem;
      transition: padding-top 0.25s ease;
    }
    body.with-banner .app-container {
      padding-top: calc(3.5rem + 2.4rem);
    }

    /* Esconder elementos que nao existem no demo */
    #setlistPrev, #setlistNext, #setlistEditBtn, #myRhythmsBtn, #saveAsMyRhythmBtn { display: none !important; }
    .fav-bar { justify-content: center; }

    /* ─── Tela de fim da demo ───
       Estrutura editorial: overline → título → corpo → preço → CTA → link.
       Sem caps lock, sem gradientes, sem glow. */
    .demo-expired-overlay {
      position: fixed; inset: 0; z-index: 99999;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 1.5rem;
      padding-top: calc(1.5rem + env(safe-area-inset-top, 0px));
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      animation: demoOverlayIn 0.28s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }
    @media (min-height: 620px) {
      .demo-expired-overlay { align-items: center; }
    }
    @keyframes demoOverlayIn { from { opacity: 0; } to { opacity: 1; } }

    .demo-expired-card {
      width: 100%;
      max-width: 440px;
      background: #0a0a0f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 2.25rem 2rem 1.5rem;
      color: #fff;
      margin: auto;
      animation: demoCardIn 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes demoCardIn {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .demo-expired-overline {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 0.85rem;
      font-weight: 500;
    }
    .demo-expired-card h2 {
      color: #fff;
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.25;
      margin: 0 0 0.85rem;
    }
    .demo-expired-card p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.92rem;
      line-height: 1.55;
      margin: 0 0 1rem;
    }
    .demo-expired-card p:last-of-type { margin-bottom: 1rem; }
    .demo-expired-card p strong { color: #fff; font-weight: 600; }

    /* Catálogo rolando — mostra visualmente todos os ritmos bloqueados */
    .demo-expired-catalog {
      position: relative;
      overflow: hidden;
      margin: 0 -2rem 1.25rem;
      padding: 0.5rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
      -webkit-mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
    }
    .demo-expired-catalog-track {
      display: flex;
      gap: 0.45rem;
      animation: demoCatalogScroll 50s linear infinite;
      white-space: nowrap;
    }
    .demo-expired-catalog-track span {
      flex-shrink: 0;
      padding: 0.28rem 0.55rem;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      letter-spacing: -0.005em;
    }
    @keyframes demoCatalogScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* Features row — 3 colunas visuais com o que o plano entrega */
    .demo-expired-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin: 0 0 1.25rem;
    }
    .demo-expired-feature {
      text-align: center;
      padding: 0.65rem 0.4rem;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: -0.005em;
      line-height: 1.3;
    }
    .demo-expired-feature span {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.15rem;
      letter-spacing: -0.02em;
    }

    /* Oferta em destaque — 48h grátis ANTES do preço pra remover
       objeção na hora da decisão */
    .demo-expired-offer {
      padding: 1rem 1.1rem 0.9rem;
      margin: 0 0 1.25rem;
      background: rgba(62, 232, 167, 0.04);
      border: 1px solid rgba(62, 232, 167, 0.18);
      border-radius: 12px;
    }
    .demo-expired-offer-main {
      display: flex; align-items: center; gap: 0.55rem;
      margin-bottom: 0.35rem;
    }
    .demo-expired-offer-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.22rem 0.55rem;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0a0a0f;
      background: #3ee8a7;
      border-radius: 5px;
    }
    .demo-expired-offer-head {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .demo-expired-offer-sub {
      font-size: 0.78rem;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.58);
      margin-bottom: 0.55rem;
    }
    .demo-expired-offer-price {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.005em;
    }

    .demo-expired-quick {
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .demo-expired-email {
      width: 100%;
      padding: 0.78rem 0.9rem;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 0.92rem;
      letter-spacing: -0.005em;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .demo-expired-email::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    .demo-expired-email:focus {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.05);
    }
    .demo-expired-cta {
      display: block;
      width: 100%;
      padding: 0.9rem;
      background: #fff;
      color: #0a0a0f;
      text-decoration: none;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.15s;
      box-shadow: none;
    }
    .demo-expired-cta:hover { opacity: 0.9; }
    .demo-expired-cta:active { transform: scale(0.99); }

    .demo-expired-sub {
      text-align: center;
      margin-top: 0.85rem;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.4);
    }
    .demo-expired-sub a {
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 1px;
    }
    .demo-expired-sub a:hover { color: #fff; }

    .demo-expired-support {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }
    .demo-expired-support a {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.75rem;
      text-decoration: none;
      transition: color 0.15s;
    }
    .demo-expired-support a:hover { color: rgba(255, 255, 255, 0.7); }

    /* ─── Tour guiado ───
       Tooltip apontando pro elemento + pulse no target.
       Nunca bloqueia a UI — só reforça a ação. */
    .demo-tour-tip {
      position: absolute;
      z-index: 9500;
      max-width: 260px;
      padding: 0.8rem 0.95rem 0.7rem;
      background: #0a0a0f;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #fff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04);
      opacity: 0;
      transform: translateY(6px) scale(0.98);
      transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: auto;
    }
    .demo-tour-tip.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .demo-tour-tip::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 12px;
      height: 12px;
      background: #0a0a0f;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }
    .demo-tour-tip-title {
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin-bottom: 0.3rem;
    }
    .demo-tour-tip-body {
      font-size: 0.78rem;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 0.55rem;
    }
    .demo-tour-tip-skip {
      display: inline-block;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }
    .demo-tour-tip-skip:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .demo-tour-pulse {
      animation: demoTourPulse 1.6s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.45);
      border-radius: 14px;
    }
    @keyframes demoTourPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.0);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.08),
                    0 0 24px rgba(255, 255, 255, 0.18);
      }
    }

    /* ─── Modal de conversão progressivo ───
       Aparece depois do tour OU após 3 trocas de ritmo (aha moment).
       Pode ser fechado e o user continua experimentando. */
    .demo-convert-modal {
      position: fixed; inset: 0; z-index: 9700;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.22s ease;
      padding: 0;
    }
    @media (min-height: 620px) {
      .demo-convert-modal { align-items: center; padding: 1.5rem; }
    }
    .demo-convert-modal.visible { opacity: 1; }

    .demo-convert-card {
      width: 100%;
      max-width: 440px;
      background: #0a0a0f;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px 20px 0 0;
      padding: 1.75rem 1.6rem 1.5rem;
      color: #fff;
      transform: translateY(40px);
      transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }
    .demo-convert-modal.visible .demo-convert-card {
      transform: translateY(0);
    }
    @media (min-height: 620px) {
      .demo-convert-card { border-radius: 20px; }
    }

    .demo-convert-overline {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      font-weight: 500;
      margin-bottom: 0.55rem;
    }
    .demo-convert-title {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin: 0 0 0.75rem;
    }
    .demo-convert-body {
      font-size: 0.88rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.62);
      margin: 0 0 0.55rem;
    }
    .demo-convert-pricing {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.5);
      margin: 0 0 1.25rem;
    }

    /* Mesma lógica do .demo-expired-offer, compacta pro modal progressivo */
    .demo-convert-offer {
      padding: 0.9rem 1rem 0.8rem;
      margin: 0 0 1.1rem;
      background: rgba(62, 232, 167, 0.04);
      border: 1px solid rgba(62, 232, 167, 0.18);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .demo-convert-offer-badge {
      align-self: flex-start;
      padding: 0.2rem 0.5rem;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0a0a0f;
      background: #3ee8a7;
      border-radius: 4px;
    }
    .demo-convert-offer-head {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.005em;
    }
    .demo-convert-offer-sub {
      font-size: 0.76rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.4;
    }
    .demo-convert-actions {
      display: flex; flex-direction: column; gap: 0.55rem;
    }
    .demo-convert-primary {
      display: block;
      padding: 0.85rem;
      background: #fff;
      color: #0a0a0f;
      text-decoration: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      text-align: center;
      transition: opacity 0.15s;
    }
    .demo-convert-primary:hover { opacity: 0.9; }
    .demo-convert-secondary {
      width: 100%;
      padding: 0.65rem;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s;
    }
    .demo-convert-secondary:hover { color: rgba(255, 255, 255, 0.85); }
  </style>
</head>
<body>
  <!-- Topbar ativo de conversão -->
  <div class="demo-topbar">
    <img src="/img/logo.png" alt="GDrums" class="demo-topbar-logo">
    <span class="demo-topbar-sep"></span>
    <div class="demo-topbar-mid">
      <span class="demo-topbar-headline">
        Cadastre e tenha <strong>48h grátis</strong> pra tocar tudo
      </span>
      <span class="demo-topbar-progress" id="demoCounter">Prévia com 3 ritmos · <strong>100 no catálogo</strong></span>
    </div>
    <a href="/register" class="demo-topbar-cta">
      <span>Começar grátis</span>
      <span class="demo-topbar-cta-arrow">→</span>
    </a>
    <div class="demo-topbar-bar" id="demoBar" style="width:100%;"></div>
  </div>

  <!-- Banner de reforço — só aparece depois que o user começou a tocar
       (evita redundância com o header quando ele acabou de chegar). -->
  <div class="demo-value-banner" id="demoValueBanner" style="display:none;">
    <span class="demo-value-dot"></span>
    <span>Essa é a banda real. <strong>Cadastra grátis</strong> pra liberar tudo.</span>
    <a href="/register" class="demo-value-cta">Começar</a>
  </div>

  <div class="app-container">
    <main class="app-main">
      <div id="userMode" class="mode-container active">
        <div class="user-layout">

          <!-- 1. Nome do ritmo -->
          <div class="fav-section">
            <div class="fav-bar">
              <div class="fav-center">
                <span class="fav-current-name" id="currentRhythmName">Selecione um ritmo</span>
              </div>
            </div>
            <div class="rhythm-strip-cards" id="rhythmStripCards" style="display:block">
              <div class="rhythm-cards-wrap" id="demoRhythmStrip"></div>
            </div>
          </div>

          <!-- 2. Beat Marker -->
          <div class="beat-section">
            <div class="beat-dots" id="beatDots">
              <div class="beat-dot" data-beat="0"></div>
              <div class="beat-dot" data-beat="1"></div>
              <div class="beat-dot" data-beat="2"></div>
              <div class="beat-dot" data-beat="3"></div>
            </div>
          </div>

          <!-- 3. Performance Grid (identico ao app) -->
          <div class="user-grid-section">
            <div class="user-performance-grid" id="performanceGrid">
              <div class="grid-cell rhythm-cell" data-type="main" data-variation="0">
                <span class="cell-number">1</span>
                <span class="cell-label">RITMO</span>
                <div class="cell-indicator"></div>
              </div>
              <div class="grid-cell rhythm-cell" data-type="main" data-variation="1">
                <span class="cell-number">2</span>
                <span class="cell-label">RITMO</span>
                <div class="cell-indicator"></div>
              </div>
              <div class="grid-cell rhythm-cell" data-type="main" data-variation="2">
                <span class="cell-number">3</span>
                <span class="cell-label">RITMO</span>
                <div class="cell-indicator"></div>
              </div>
              <div class="grid-cell fill-cell" data-type="fill" data-variation="0">
                <span class="cell-number">1</span>
                <span class="cell-label">VIRADA</span>
                <div class="cell-indicator"></div>
              </div>
              <div class="grid-cell fill-cell" data-type="fill" data-variation="1">
                <span class="cell-number">2</span>
                <span class="cell-label">VIRADA</span>
                <div class="cell-indicator"></div>
              </div>
              <div class="grid-cell fill-cell" data-type="fill" data-variation="2">
                <span class="cell-number">3</span>
                <span class="cell-label">VIRADA</span>
                <div class="cell-indicator"></div>
              </div>
              <div class="grid-cell end-cell" data-type="end" data-variation="0">
                <span class="cell-label">FINAL</span>
                <div class="cell-indicator"></div>
              </div>
              <div class="grid-cell cymbal-cell" id="cymbalBtn">
                <span class="cell-label">PRATO</span>
                <div class="cell-indicator"></div>
              </div>
            </div>
          </div>

          <!-- 4. Controles (identico ao app) -->
          <div class="controls-bar">
            <div class="ctrl-group">
              <span class="ctrl-label">BPM</span>
              <div class="ctrl-row">
                <button id="tempoDownUser" class="ctrl-btn ctrl-btn-bpm">&minus;</button>
                <button id="tempoDisplayUser" class="ctrl-value ctrl-value-tap">80</button>
                <button id="tempoUpUser" class="ctrl-btn ctrl-btn-bpm">+</button>
              </div>
            </div>
            <div class="ctrl-divider"></div>
            <div class="ctrl-group ctrl-group-vol">
              <span class="ctrl-label">VOL</span>
              <div class="ctrl-row">
                <input type="range" id="masterVolumeUser" min="0" max="200" value="200" step="5" class="ctrl-slider">
                <span class="ctrl-value ctrl-value-sm" id="volumeDisplayUser">100%</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/demo.ts"></script>
</body>
</html>
